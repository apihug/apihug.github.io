<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.1"
     width="1400"
     height="900"
     viewBox="0 0 1400 900">

  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="100%" stop-color="#F3F6FA"/>
    </linearGradient>

    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B1F5F"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-opacity="0.10"/>
    </filter>

    <style>
      .title {
        font-family: Inter, Arial, sans-serif;
        font-size: 42px;
        font-weight: 700;
        fill: #0F172A;
      }

      .subtitle {
        font-family: Inter, Arial, sans-serif;
        font-size: 18px;
        font-weight: 400;
        fill: #64748B;
      }

      .box-title {
        font-family: Inter, Arial, sans-serif;
        font-size: 26px;
        font-weight: 700;
      }

      .box-text {
        font-family: Inter, Arial, sans-serif;
        font-size: 16px;
        font-weight: 400;
      }

      .label {
        font-family: Inter, Arial, sans-serif;
        font-size: 15px;
        font-weight: 600;
      }

      .side {
        font-family: Inter, Arial, sans-serif;
        font-size: 28px;
        font-weight: 700;
        fill: #0F172A;
      }
    </style>

  </defs>

  <!-- Background -->

  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- Header -->

  <text x="700" y="78" text-anchor="middle" class="title">
    ApiHug
  </text>

  <text x="700" y="112" text-anchor="middle" class="subtitle">
    Semantic Execution Infrastructure for AI-Native Enterprises
  </text>

  <text x="700" y="140" text-anchor="middle" class="subtitle">
    The Operating Language Between AI and Enterprise Systems
  </text>

  <!-- Left Rail -->

  <rect x="40"
        y="180"
        width="150"
        height="520"
        rx="24"
        fill="#FFFFFF"
        stroke="#D6DCE8"
        filter="url(#shadow)"/>

  <text x="115"
        y="320"
        text-anchor="middle"
        class="side"
        transform="rotate(-90 115 320)">
    Security
  </text>

  <text x="115"
        y="570"
        text-anchor="middle"
        class="side"
        transform="rotate(-90 115 570)">
    Governance
  </text>

  <!-- Right Rail -->

  <rect x="1210"
        y="180"
        width="150"
        height="520"
        rx="24"
        fill="#FFFFFF"
        stroke="#D6DCE8"
        filter="url(#shadow)"/>

  <text x="1285"
        y="320"
        text-anchor="middle"
        class="side"
        transform="rotate(90 1285 320)">
    Observability
  </text>

  <text x="1285"
        y="570"
        text-anchor="middle"
        class="side"
        transform="rotate(90 1285 570)">
    Collaboration
  </text>

  <!-- AI Layer -->

  <rect x="300"
        y="190"
        width="800"
        height="90"
        rx="20"
        fill="#FFFFFF"
        stroke="#D6DCE8"
        filter="url(#shadow)"/>

  <text x="700"
        y="245"
        text-anchor="middle"
        class="box-title"
        fill="#0F172A">
    AI Applications &amp; Agents
  </text>

  <!-- Arrow -->

  <line x1="700" y1="280" x2="700" y2="320"
        stroke="#2563EB"
        stroke-width="3"/>

  <polygon points="700,332 692,320 708,320"
           fill="#2563EB"/>

  <!-- Core Layer -->

  <rect x="250"
        y="330"
        width="900"
        height="190"
        rx="28"
        fill="url(#core)"
        filter="url(#shadow)"/>

  <text x="700"
        y="392"
        text-anchor="middle"
        class="box-title"
        fill="#FFFFFF">
    Semantic Execution Layer
  </text>

  <text x="700"
        y="425"
        text-anchor="middle"
        class="box-text"
        fill="#DDE7FF">
    Single Source of Truth
  </text>

  <line x1="550" y1="455" x2="550" y2="495"
        stroke="#4E73DA"/>

  <line x1="850" y1="455" x2="850" y2="495"
        stroke="#4E73DA"/>

  <text x="400"
        y="485"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    DSL
  </text>

  <text x="700"
        y="485"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    Protocol
  </text>

  <text x="1000"
        y="485"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    AI Context
  </text>

  <!-- Runtime Arrow -->

  <line x1="700" y1="520" x2="700" y2="570"
        stroke="#2563EB"
        stroke-width="3"/>

  <polygon points="700,582 692,570 708,570"
           fill="#2563EB"/>

  <!-- Runtime -->

  <rect x="300"
        y="580"
        width="800"
        height="90"
        rx="20"
        fill="#FFFFFF"
        stroke="#D6DCE8"
        filter="url(#shadow)"/>

  <text x="700"
        y="636"
        text-anchor="middle"
        class="box-title"
        fill="#0F172A">
    Execution Runtime
  </text>

  <!-- Systems Arrow -->

  <line x1="700" y1="670" x2="700" y2="720"
        stroke="#2563EB"
        stroke-width="3"/>

  <polygon points="700,732 692,720 708,720"
           fill="#2563EB"/>

  <!-- Systems -->

  <rect x="300"
        y="730"
        width="800"
        height="90"
        rx="20"
        fill="#FFFFFF"
        stroke="#D6DCE8"
        filter="url(#shadow)"/>

  <text x="700"
        y="786"
        text-anchor="middle"
        class="box-title"
        fill="#0F172A">
    Enterprise Systems
  </text>

  <!-- Feedback Loop -->

  <path d="M250 425
           C150 425 150 720 300 775"
        fill="none"
        stroke="#3B82F6"
        stroke-width="3"
        stroke-dasharray="10 8"/>

  <path d="M1100 775
           C1250 720 1250 425 1150 425"
        fill="none"
        stroke="#3B82F6"
        stroke-width="3"
        stroke-dasharray="10 8"/>

  <path d="M300 775
           C520 860 880 860 1100 775"
        fill="none"
        stroke="#3B82F6"
        stroke-width="3"
        stroke-dasharray="10 8"/>

  <!-- Flow Markers -->

  <circle cx="220" cy="430" r="26" fill="#2563EB"/>
  <text x="220" y="437"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    1
  </text>

  <circle cx="220" cy="710" r="26" fill="#2563EB"/>
  <text x="220" y="717"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    2
  </text>

  <circle cx="1180" cy="710" r="26" fill="#2563EB"/>
  <text x="1180" y="717"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    4
  </text>

  <circle cx="1180" cy="430" r="26" fill="#2563EB"/>
  <text x="1180" y="437"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    5
  </text>

  <!-- Foundation -->

  <rect x="260"
        y="850"
        width="880"
        height="30"
        rx="15"
        fill="#0F172A"/>

  <text x="700"
        y="870"
        text-anchor="middle"
        fill="#FFFFFF"
        class="label">
    Developer Platform | Git Native | Enterprise Scale
  </text>

</svg>